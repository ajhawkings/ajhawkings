<svg width="495" height="195" viewBox="0 0 495 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="stats-title stats-desc">
  <title id="stats-title">Angus's GitHub stats</title>
  <desc id="stats-desc">Placeholder card that will be replaced by the GitHub Actions generated stats card after the workflow runs.</desc>
  <rect x="0.5" y="0.5" width="494" height="194" rx="4.5" fill="#fffefe" stroke="#e4e2e2"/>
  <text x="25" y="42" fill="#2f80ed" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="18" font-weight="600">GitHub Stats</text>
  <text x="25" y="78" fill="#434d58" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="14">This card is generated by GitHub Actions.</text>
  <text x="25" y="102" fill="#434d58" font-family="'Segoe UI', Ubuntu, Sans-Serif" font-size="14">After the first approved run, it will refresh automatically</text>
