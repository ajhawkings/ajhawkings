name: Update README stats

on:
  push:
    paths:
      - README.md
      - .github/workflows/update-readme-stats.yml
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&count_private=true&show_icons=true&include_all_commits=true&hide=stars&hide_rank=true
          path: profile/stats.svg
          token: ${{ secrets.GH_README_STATS_TOKEN || github.token }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&exclude_repo=games,terminal-documentation,squabble&hide=html
          path: profile/top-langs.svg
          token: ${{ secrets.GH_README_STATS_TOKEN || github.token }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stats" || exit 0
          git push
